name: Workspace

on:
  pull_request:
    paths-ignore:
      - README.md
  push:
    branches: master

permissions:
  contents: read

# Cancels CI jobs when new commits are pushed to a PR branch
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
